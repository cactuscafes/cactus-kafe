<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menü — Cactus Coffee</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#2d5a27;--dark:#1a1a1a;--light:#f8f6f2;--border:#e8e4df;}
body{font-family:'Montserrat',sans-serif;color:var(--dark);background:#fff;}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:16px 48px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo img{height:44px;width:auto;object-fit:contain;}
.nav-links{display:flex;gap:36px;list-style:none;}
.nav-links a{text-decoration:none;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--dark);font-weight:400;transition:color .3s;}
.nav-links a:hover{color:var(--gold);}

/* HEADER */
.menu-header{text-align:center;padding:70px 40px 50px;border-bottom:1px solid var(--border);}
.menu-header-eyebrow{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
.menu-header-title{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,6vw,80px);font-weight:300;letter-spacing:2px;line-height:1;}
.menu-header-title em{font-style:italic;}
.menu-header-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#999;margin-top:16px;}

/* SUBE TABS */
.sube-tabs{display:flex;justify-content:center;gap:0;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:77px;z-index:99;}
.sube-tab{padding:18px 48px;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;color:#999;font-family:'Montserrat',sans-serif;font-weight:400;transition:all .3s;}
.sube-tab.on{color:var(--dark);border-bottom-color:var(--dark);}

/* SPOTLIGHT */
.spotlight{padding:60px 48px;border-bottom:1px solid var(--border);}
.spotlight-title{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:#999;text-align:center;margin-bottom:40px;}
.spotlight-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;}
.spotlight-card{position:relative;overflow:hidden;cursor:pointer;}
.spotlight-card img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;transition:transform .5s ease;}
.spotlight-card:hover img{transform:scale(1.04);}
.spotlight-card-info{padding:14px 4px;}
.spotlight-card-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;margin-bottom:4px;}
.spotlight-card-price{font-size:12px;color:#666;font-weight:500;}
.spotlight-card-emoji{font-size:13px;margin-right:4px;}

/* CATEGORY LIST */
.cat-list{padding:0 48px;}
.cat-section{border-bottom:1px solid var(--border);}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:32px 0;cursor:pointer;transition:opacity .2s;}
.cat-header:hover{opacity:.7;}
.cat-header-left{display:flex;align-items:baseline;gap:20px;}
.cat-name{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,4vw,52px);font-weight:300;letter-spacing:1px;}
.cat-count{font-size:11px;letter-spacing:2px;color:#bbb;text-transform:uppercase;}
.cat-arrow{font-size:20px;color:#bbb;transition:transform .3s;}
.cat-section.open .cat-arrow{transform:rotate(45deg);}

/* PRODUCTS */
.cat-products{max-height:0;overflow:hidden;padding-bottom:0;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;transition:max-height 0.4s ease,padding-bottom 0.3s;}
.cat-section.open .cat-products{max-height:3000px;padding-bottom:40px;}
.product-card{padding:4px 0;}
.product-img-wrap{overflow:hidden;aspect-ratio:1;background:#f5f5f5;margin-bottom:12px;}
.product-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
.product-card:hover .product-img-wrap img{transform:scale(1.04);}
.product-emoji-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;background:#f8f6f2;}
.product-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;margin-bottom:4px;line-height:1.3;}
.product-desc{font-size:11px;color:#888;line-height:1.6;margin-bottom:6px;font-weight:300;}
.product-price{font-size:13px;font-weight:500;color:var(--dark);}

/* ÜRÜN POPUP */
.upop-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.upop-bg.on{display:flex;}
.upop{background:#fff;max-width:440px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:upopIn .22s ease;}
@keyframes upopIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.upop-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.6);color:#fff;border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:20px;line-height:1;z-index:2;display:flex;align-items:center;justify-content:center;}
.upop-img{width:100%;aspect-ratio:1;overflow:hidden;background:#f5f5f5;}
.upop-img img{width:100%;height:100%;object-fit:cover;display:block;}
.upop-emoji{width:100%;height:220px;display:flex;align-items:center;justify-content:center;font-size:72px;background:#f8f6f2;}
.upop-body{padding:24px 28px 36px;}
.upop-name{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;line-height:1.15;margin-bottom:10px;}
.upop-desc{font-size:13px;color:#777;line-height:1.75;font-weight:300;margin-bottom:18px;}
.upop-price{font-size:22px;font-weight:600;color:var(--gold);}
.product-card{cursor:pointer;}
.spotlight-card{cursor:pointer;}

/* FOOTER */
footer{background:var(--dark);color:#fff;padding:60px 48px 30px;margin-top:80px;}
.footer-inner{display:flex;justify-content:space-between;align-items:flex-start;gap:40px;margin-bottom:40px;}
.footer-logo img{height:48px;width:auto;filter:brightness(0) invert(1);}
.footer-links{display:flex;gap:32px;}
.footer-links a{text-decoration:none;color:#888;font-size:11px;letter-spacing:2px;text-transform:uppercase;transition:color .3s;}
.footer-links a:hover{color:#fff;}
.footer-bottom{border-top:1px solid #333;padding-top:24px;display:flex;justify-content:space-between;}
.footer-bottom p{font-size:11px;color:#555;letter-spacing:1px;}

/* MOBILE */
.nav-burger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
.nav-burger span{display:block;width:22px;height:1.5px;background:var(--dark);transition:all .3s;}
.menu-mob{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.99);z-index:490;flex-direction:column;align-items:center;justify-content:center;gap:36px;}
.menu-mob.on{display:flex;}
.menu-mob a{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;font-style:italic;color:var(--dark);text-decoration:none;transition:color .2s;}
.menu-mob a:hover{color:var(--gold);}
@media(max-width:768px){
nav{padding:14px 20px;}
.nav-links{display:none;}
.nav-burger{display:flex;}
.menu-header{padding:50px 20px 36px;}
.sube-tabs{top:73px;}
.sube-tab{padding:14px 24px;font-size:10px;}
.spotlight{padding:40px 20px;}
.spotlight-grid{grid-template-columns:1fr 1fr;}
.cat-list{padding:0 20px;}
.cat-section.open .cat-products{grid-template-columns:1fr 1fr;max-height:3000px;padding-bottom:40px;}
footer{padding:40px 20px 24px;}
.footer-inner{flex-direction:column;gap:24px;}
.footer-links{flex-wrap:wrap;gap:20px;}
.footer-bottom{flex-direction:column;gap:8px;}
}
</style>
</head>
<body>


<nav>
  <a href="index.html" class="nav-logo"><img src="https://soft-block-e14ccactus-foto-uploader.batuhanbulut.workers.dev/menu/1776725885776-plqcx3hemz.jpg" alt="Cactus Coffee"></a>
  <ul class="nav-links">
    <li><a href="index.html">Ana Sayfa</a></li>
    <li><a href="menu.html">Menü</a></li>
    <li><a href="iletisim.html">İletişim</a></li>
    <li><a href="iletisim.html" style="background:#b8965a;color:#fff;padding:6px 14px;">İş Başvurusu</a></li>
  </ul>
  <button class="nav-burger" id="menuBurger" onclick="toggleMenuNav()">
    <span id="mb1"></span><span id="mb2"></span><span id="mb3"></span>
  </button>
</nav>
<div class="menu-mob" id="menuMob">
  <a href="index.html" onclick="toggleMenuNav()">Ana Sayfa</a>
  <a href="menu.html" onclick="toggleMenuNav()">Menü</a>
  <a href="iletisim.html" onclick="toggleMenuNav()">İletişim</a>
  <a href="iletisim.html" style="font-size:16px;letter-spacing:3px;font-style:normal;font-family:'Montserrat',sans-serif;background:#b8965a;color:#fff;padding:12px 28px;text-decoration:none;">İş Başvurusu</a>
</div>

<div class="menu-header">
  <p class="menu-header-eyebrow">Cactus Coffee</p>
  <h1 class="menu-header-title">C | <em>Menü</em></h1>
  <p class="menu-header-sub">FSM Şubesi &nbsp;·&nbsp; Podyumpark Şubesi</p>
</div>

<div class="sube-tabs">
  <button class="sube-tab on" onclick="subeGoster('fsm',this)">🏙 FSM Şubesi</button>
  <button class="sube-tab" onclick="subeGoster('podyum',this)">🌿 Podyumpark</button>
</div>

<div id="menu-fsm">
  <div class="spotlight" id="spotlight-fsm">
    <p class="spotlight-title">Öne Çıkanlar</p>
    <div class="spotlight-grid" id="spotlight-grid-fsm"></div>
  </div>
  <div class="cat-list" id="cat-list-fsm"></div>
</div>

<div id="menu-podyum" style="display:none;">
  <div class="spotlight" id="spotlight-podyum">
    <p class="spotlight-title">Öne Çıkanlar</p>
    <div class="spotlight-grid" id="spotlight-grid-podyum"></div>
  </div>
  <div class="cat-list" id="cat-list-podyum"></div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-logo"><img src="https://soft-block-e14ccactus-foto-uploader.batuhanbulut.workers.dev/menu/1776725885776-plqcx3hemz.jpg" alt="Cactus Coffee"></div>
    <div class="footer-links">
      <a href="index.html">Ana Sayfa</a>
      <a href="menu.html">Menü</a>
      
      <a href="iletisim.html">İletişim</a>
    </div>
  </div>
  <div class="footer-bottom">
    <p>© 2025 Cactus Coffee. Tüm hakları saklıdır.</p>
    <p>Bursa, Türkiye</p>
  </div>
</footer>

<!-- Ürün Popup -->
<div class="upop-bg" id="upopBg" onclick="if(event.target===this)upopKapat()">
  <div class="upop" id="upop">
    <button class="upop-close" onclick="upopKapat()">×</button>
    <div id="upopImg"></div>
    <div class="upop-body">
      <div class="upop-name" id="upopAd"></div>
      <div class="upop-desc" id="upopAciklama"></div>
      <div class="upop-price" id="upopFiyat"></div>
    </div>
  </div>
</div>

<script>
var menuData = {};
var oncuData = [];
var POPUP_DATA = [];

async function init() {
  try {
    var r = await fetch('https://raw.githubusercontent.com/cactuscafes/cactus-kafe/main/menu-data.json?t=' + Date.now());
    var data = await r.json();
    Object.keys(data).forEach(function(k){ menuData[k] = data[k]; });
  } catch(e) { console.error('Menu yuklenemedi', e); }
  renderMenu('fsm');
  renderMenu('podyum');
}

function renderMenu(sube) {
  var subeData = menuData[sube];
  if (!subeData) return;
  var catListEl = document.getElementById('cat-list-' + sube);
  if (!catListEl) return;
  var katData = Object.values(subeData);
  var allProducts = katData.reduce(function(a,k){ return a.concat(k.urunler||[]); },[]);
  var spotItems = (menuData.oncu && menuData.oncu.length > 0)
    ? menuData.oncu
    : allProducts.filter(function(u){ return u.foto; }).slice(0,4);
  var spotGridEl = document.getElementById('spotlight-grid-' + sube);
  var spotlightEl = document.getElementById('spotlight-' + sube);
  if (spotItems.length > 0 && spotGridEl) {
    spotGridEl.innerHTML = spotItems.map(function(u){
      var pidx = POPUP_DATA.length;
      POPUP_DATA.push({ad:u.ad,fiyat:u.fiyat||'',aciklama:u.aciklama||'',foto:u.foto||'',emoji:u.emoji||''});
      var c='<div class="spotlight-card" onclick="upopAc('+pidx+')">';
      c+='<img src="'+u.foto+'" alt="'+u.ad+'" onerror="this.style.display=\'none\'">';
      c+='<div class="spotlight-card-info"><div class="spotlight-card-name">'+(u.emoji||'')+' '+u.ad+'</div>';
      c+='<div class="spotlight-card-price">'+(u.fiyat||'')+' TL</div></div></div>';
      return c;
    }).join('');
  } else if (spotlightEl) { spotlightEl.style.display='none'; }
  catListEl.innerHTML = katData.map(function(kat) {
    var urunler=(kat.urunler||[]).filter(function(u){ return !u.gizli; });
    if (!urunler.length) return '';
    var uH=urunler.map(function(u){
      var pidx = POPUP_DATA.length;
      POPUP_DATA.push({ad:u.ad,fiyat:u.fiyat||'',aciklama:u.aciklama||'',foto:u.foto||'',emoji:u.emoji||''});
      var img=u.foto?'<img src="'+u.foto+'" alt="'+u.ad+'" loading="lazy">':'<div class="product-emoji-placeholder">'+(u.emoji||'')+'</div>';
      var h='<div class="product-card" onclick="upopAc('+pidx+')">';
      h+='<div class="product-img-wrap">'+img+'</div>';
      h+='<div class="product-name">'+(u.emoji||'')+' '+u.ad+'</div>';
      if(u.aciklama) h+='<div class="product-desc">'+u.aciklama+'</div>';
      h+='<div class="product-price">'+(u.fiyat||'-')+' TL</div></div>';
      return h;
    }).join('');
    var ch='<div class="cat-section" id="cat-'+kat.id+'-'+sube+'">';
    ch+='<div class="cat-header" onclick="toggleCat(\'cat-'+kat.id+'-'+sube+'\')">';
    ch+='<div class="cat-header-left"><span class="cat-name">'+kat.label+'</span>';
    ch+='<span class="cat-count">'+urunler.length+' cesit</span></div>';
    ch+='<span class="cat-arrow">+</span></div>';
    ch+='<div class="cat-products">'+uH+'</div></div>';
    return ch;
  }).join('');
}

function toggleCat(id) {
  var el=document.getElementById(id);
  if(!el) return;
  el.classList.toggle('open');
}

function subeGoster(sube,btn) {
  document.querySelectorAll('.sube-tab').forEach(function(b){ b.classList.remove('on'); });
  if(btn) btn.classList.add('on');
  var fsm=document.getElementById('menu-fsm');
  var pod=document.getElementById('menu-podyum');
  if(fsm) fsm.style.display=sube==='fsm'?'':'none';
  if(pod) pod.style.display=sube==='podyum'?'':'none';
}

function upopAc(idx) {
  var u = POPUP_DATA[idx];
  if (!u) return;
  // Image or emoji
  var imgDiv = document.getElementById('upopImg');
  if (u.foto) {
    imgDiv.className = 'upop-img';
    imgDiv.innerHTML = '<img src="'+u.foto+'" alt="'+u.ad+'">';
  } else {
    imgDiv.className = '';
    imgDiv.innerHTML = '<div class="upop-emoji">'+(u.emoji||'☕')+'</div>';
  }
  document.getElementById('upopAd').textContent = (u.emoji ? u.emoji+' ' : '') + u.ad;
  document.getElementById('upopAciklama').textContent = u.aciklama || '';
  document.getElementById('upopAciklama').style.display = u.aciklama ? '' : 'none';
  document.getElementById('upopFiyat').textContent = u.fiyat ? u.fiyat+' TL' : '';
  document.getElementById('upopBg').classList.add('on');
  document.body.style.overflow = 'hidden';
}
function upopKapat() {
  document.getElementById('upopBg').classList.remove('on');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') upopKapat(); });

window.addEventListener('load', init);
function toggleMenuNav(){
  var mob=document.getElementById('menuMob');
  var isOpen=mob.classList.toggle('on');
  document.getElementById('mb1').style.transform=isOpen?'rotate(45deg) translateY(6.5px)':'';
  document.getElementById('mb2').style.opacity=isOpen?'0':'1';
  document.getElementById('mb3').style.transform=isOpen?'rotate(-45deg) translateY(-6.5px)':'';
  document.body.style.overflow=isOpen?'hidden':'';
}
</script>
</body>
</html>
