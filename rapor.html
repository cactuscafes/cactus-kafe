<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cactus Raporlar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:#f4f4f4;color:#111;}
.hdr{background:#111;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;}
.hdr h1{color:#fff;font-size:15px;letter-spacing:2px;}
.hdr a{color:#aaa;font-size:12px;text-decoration:none;}
.tabs{display:flex;background:#fff;border-bottom:2px solid #eee;}
.tab{flex:1;padding:14px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;color:#999;border-bottom:3px solid transparent;margin-bottom:-2px;}
.tab.p.on{color:#2d7a4f;border-color:#2d7a4f;}
.tab.f.on{color:#c67000;border-color:#c67000;}
.wrap{max-width:1000px;margin:0 auto;padding:16px;}
.panel{display:none;}.panel.on{display:block;}
.filtre{background:#fff;border-radius:8px;padding:14px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.filtre label{font-size:10px;font-weight:700;color:#999;display:block;margin-bottom:4px;text-transform:uppercase;}
.filtre input{padding:8px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;width:150px;}
.btn{padding:9px 16px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;}
.gp{background:#2d7a4f;color:#fff;}.gf{background:#c67000;color:#fff;}.pdf{background:#111;color:#fff;}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.card{background:#fff;border-radius:8px;padding:14px;text-align:center;}
.card .n{font-size:22px;font-weight:800;}.cp .n{color:#2d7a4f;}.cf .n{color:#c67000;}
.card .l{font-size:10px;color:#aaa;margin-top:3px;text-transform:uppercase;}
.box{background:#fff;border-radius:8px;overflow:hidden;margin-bottom:14px;}
.box-ttl{padding:12px 16px;font-weight:700;font-size:13px;border-bottom:1px solid #f0f0f0;}
table{width:100%;border-collapse:collapse;}
th{background:#f8f8f8;padding:8px 12px;text-align:left;font-size:10px;text-transform:uppercase;color:#aaa;font-weight:700;}
td{padding:8px 12px;border-bottom:1px solid #f5f5f5;font-size:12px;}
tr:last-child td{border-bottom:none;}
.bos{text-align:center;padding:30px;color:#bbb;}
@media(max-width:600px){.cards{grid-template-columns:1fr 1fr;}.filtre{flex-direction:column;}}
</style>
</head>
<body>
<div class="hdr"><h1>CACTUS RAPORLAR</h1><a href="admin.html">Admin</a></div>
<div class="tabs">
  <button class="tab p on" id="tab-p" onclick="sekme('p')">Podyumpark</button>
  <button class="tab f" id="tab-f" onclick="sekme('f')">FSM</button>
</div>
<div class="wrap">
  <div class="panel on" id="pp">
    <div class="filtre">
      <div><label>Baslangic</label><input type="date" id="bp" value="2026-04-01"></div>
      <div><label>Bitis</label><input type="date" id="ep" value="2026-04-30"></div>
      <button class="btn gp" onclick="getir('podyum','p')">Getir</button>
      <button class="btn pdf" onclick="pdfIndir('podyum','p')">PDF</button>
    </div>
    <div class="cards">
      <div class="card cp"><div class="n" id="c1p">-</div><div class="l">Ciro</div></div>
      <div class="card cp"><div class="n" id="c2p">-</div><div class="l">Satis</div></div>
      <div class="card cp"><div class="n" id="c3p">-</div><div class="l">Gun</div></div>
      <div class="card cp"><div class="n" id="c4p">-</div><div class="l">Gunluk Ort.</div></div>
    </div>
    <div class="box" id="top-p" style="display:none"><div class="box-ttl">En Cok Satanlar</div><table><thead><tr><th>#</th><th>Urun</th><th>Adet</th></tr></thead><tbody id="tb-top-p"></tbody></table></div>
    <div class="box"><div class="box-ttl">Gunluk Ozet</div><table><thead><tr><th>Tarih</th><th>Ciro</th><th>Satis</th><th></th></tr></thead><tbody id="tb-gun-p"><tr><td colspan="4" class="bos">Getir'e basin</td></tr></tbody></table></div>
    <div class="box" id="det-p" style="display:none"><div class="box-ttl">Detay</div><table><thead><tr><th>Tarih</th><th>Urun</th><th>Kat</th><th>Adet</th><th>Birim</th><th>Toplam</th></tr></thead><tbody id="tb-det-p"></tbody></table></div>
  </div>
  <div class="panel" id="pf">
    <div class="filtre">
      <div><label>Baslangic</label><input type="date" id="bf" value="2026-04-01"></div>
      <div><label>Bitis</label><input type="date" id="ef" value="2026-04-30"></div>
      <button class="btn gf" onclick="getir('fsm','f')">Getir</button>
      <button class="btn pdf" onclick="pdfIndir('fsm','f')">PDF</button>
    </div>
    <div class="cards">
      <div class="card cf"><div class="n" id="c1f">-</div><div class="l">Ciro</div></div>
      <div class="card cf"><div class="n" id="c2f">-</div><div class="l">Satis</div></div>
      <div class="card cf"><div class="n" id="c3f">-</div><div class="l">Gun</div></div>
      <div class="card cf"><div class="n" id="c4f">-</div><div class="l">Gunluk Ort.</div></div>
    </div>
    <div class="box" id="top-f" style="display:none"><div class="box-ttl">En Cok Satanlar</div><table><thead><tr><th>#</th><th>Urun</th><th>Adet</th></tr></thead><tbody id="tb-top-f"></tbody></table></div>
    <div class="box"><div class="box-ttl">Gunluk Ozet</div><table><thead><tr><th>Tarih</th><th>Ciro</th><th>Satis</th><th></th></tr></thead><tbody id="tb-gun-f"><tr><td colspan="4" class="bos">Getir'e basin</td></tr></tbody></table></div>
    <div class="box" id="det-f" style="display:none"><div class="box-ttl">Detay</div><table><thead><tr><th>Tarih</th><th>Urun</th><th>Kat</th><th>Adet</th><th>Birim</th><th>Toplam</th></tr></thead><tbody id="tb-det-f"></tbody></table></div>
  </div>
</div>
<script src="https://cactus-rapor-api.batuhanbulut.workers.dev/rapor.js"></script>
</body>
</html>
